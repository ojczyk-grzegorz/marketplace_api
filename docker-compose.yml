services:
  backend:
    image: marketplace-api
    pull_policy: never
    container_name: marketplace-api
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    env_file:
      - .env

  postgres:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ./postgres/CREATE_TABLES.sql:/docker-init-scripts/CREATE_TABLES.sql
      - ./postgres/INSERT_MOCK_DATA.sql:/docker-init-scripts/INSERT_MOCK_DATA.sql

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
